<html lang="en">
<head>
<meta charset="UTF-8">

<title>POKÉMON PUZZLE BATTLE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --bg: #0f051f;
  --accent: #ff2a6d;
  --gold: #ffd700;
  --text: #ffffff;
  --green: #4ade80;
  --red: #f87171;
}

* { margin:0; padding:0; box-sizing:border-box; image-rendering:pixelated; }

body {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── BACKGROUND ── */
#arena-bg {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #2a1b4d 0%, #0f051f 70%);
  z-index: 0;
}
.star { position:absolute; border-radius:50%; background:#fff; animation: twinkle 2s infinite alternate; }
@keyframes twinkle { from{opacity:.2} to{opacity:.9} }

/* ── SCREENS ── */
.screen { display:none; position:relative; z-index:1; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; }
.active { display:flex; }

/* ── HERO FOREGROUND POKÉMON ── */
.hero-content { position:relative; z-index:2; }
.hero-pokemon {
  position:absolute; bottom:0; left:0; width:100%;
  display:flex; align-items:flex-end; justify-content:center;
  z-index:1; pointer-events:none;
}
.hero-pokemon img {
  filter: drop-shadow(0 0 14px currentColor);
  animation: heroBob 3s ease-in-out infinite;
  opacity:.95;
}
.hero-pokemon .poke-1 { width:70px;  margin:0 -8px; color:#4ade80; animation-delay:.0s; }
.hero-pokemon .poke-2 { width:90px;  margin:0 -10px; color:#f87171; animation-delay:.4s; }
.hero-pokemon .poke-3 { width:120px; margin:0 -12px; color:#fcd34d; animation-delay:.2s; z-index:2; }
.hero-pokemon .poke-4 { width:130px; margin:0 -12px; color:#f87171; animation-delay:.6s; z-index:2; }
.hero-pokemon .poke-5 { width:95px;  margin:0 -10px; color:#60a5fa; animation-delay:.3s; }
.hero-pokemon .poke-6 { width:75px;  margin:0 -8px;  color:#c084fc; animation-delay:.5s; }
@keyframes heroBob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-12px); }
}

/* ── TITLE ── */
.title {
  font-size: 2.6rem;
  background: linear-gradient(90deg, #ff2a6d, #ffd700, #ff2a6d);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer { from{background-position:0%} to{background-position:200%} }
.subtitle { color:#ff9; font-size:.85rem; margin:12px 0 36px; letter-spacing:3px; }
.start-btn {
  padding:16px 48px; font-size:1.1rem;
  background: linear-gradient(135deg,#ff2a6d,#c0006a);
  color:#fff; border:none; cursor:pointer;
  box-shadow:0 0 30px #ff2a6d88;
  transition: all .2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.start-btn:hover { transform:scale(1.08); box-shadow:0 0 50px #ff2a6d; }

/* ── GAME SCREEN ── */
#game-screen { padding:8px; gap:6px; }

/* ── BATTLE ARENA ── */
.battle-arena {
  width:100%; max-width:920px;
  background: linear-gradient(180deg, #1a0f30 0%, #0d0820 100%);
  border:4px solid #ffd700;
  box-shadow: 0 0 20px #ffd70044;
  padding:12px 24px;
  display:flex; align-items:center; justify-content:space-between;
  position:relative; overflow:hidden;
}
.battle-arena::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,215,0,.03) 60px, rgba(255,215,0,.03) 61px);
}

/* ── SPRITE CONTAINERS ── */
.fighter {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  position:relative; z-index:2;
}

/* Player sprite faces RIGHT, opponent faces LEFT (mirrored) */
.fighter-player .sprite-wrap { transform: scaleX(1); }
.fighter-opp    .sprite-wrap { transform: scaleX(-1); } /* flipped to face each other */

.sprite-wrap {
  width:110px; height:110px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.sprite-wrap img {
  width:100%; height:100%; object-fit:contain;
  filter: drop-shadow(0 0 8px currentColor);
  transition: transform .15s;
}
.fighter-player .sprite-wrap img { filter: drop-shadow(0 0 10px #4ade80); }
.fighter-opp    .sprite-wrap img { filter: drop-shadow(0 0 10px #f87171); }

/* Platform shadow */
.platform {
  width:90px; height:10px;
  background: radial-gradient(ellipse, rgba(255,255,255,.15), transparent);
  border-radius:50%; margin-top:-4px;
}

.fighter-name { font-size:.65rem; letter-spacing:2px; }
.fighter-player .fighter-name { color:#4ade80; }
.fighter-opp    .fighter-name { color:#f87171; }

.hp-row { display:flex; align-items:center; gap:6px; }
.hp-label { font-size:.5rem; color:#aaa; }
.health-bar { width:130px; height:20px; background:#111; border:2px solid #444; border-radius:3px; }
.health-fill { height:100%; transition:width .4s; }
.fighter-player .health-fill { background:linear-gradient(90deg,#22c55e,#4ade80); }
.fighter-opp    .health-fill { background:linear-gradient(90deg,#dc2626,#f87171); }

/* VS badge */
.vs-badge {
  font-size:1.8rem; color:#ffd700;
  text-shadow:0 0 20px #ffd700;
  animation: vsPulse 1.5s ease-in-out infinite;
  z-index:2;
}
@keyframes vsPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

/* ── ANIMATIONS: ATTACK & HIT ── */

/* Player attacks: slide right */
@keyframes playerAttack {
  0%   { transform: scaleX(1) translateX(0); }
  40%  { transform: scaleX(1) translateX(80px); }
  60%  { transform: scaleX(1) translateX(80px); }
  100% { transform: scaleX(1) translateX(0); }
}
/* Opponent attacks: slide left */
@keyframes oppAttack {
  0%   { transform: scaleX(-1) translateX(0); }
  40%  { transform: scaleX(-1) translateX(80px); }
  60%  { transform: scaleX(-1) translateX(80px); }
  100% { transform: scaleX(-1) translateX(0); }
}

.fighter-player.attacking .sprite-wrap { animation: playerAttack .55s ease-in-out; }
.fighter-opp.attacking    .sprite-wrap { animation: oppAttack .55s ease-in-out; }

/* Hit flash */
@keyframes hitFlash {
  0%,100%{ filter:drop-shadow(0 0 10px #f87171); opacity:1; }
  25%    { filter:drop-shadow(0 0 24px #fff) brightness(3); opacity:.4; }
  50%    { filter:drop-shadow(0 0 10px #f87171); opacity:1; }
  75%    { filter:drop-shadow(0 0 24px #fff) brightness(3); opacity:.4; }
}
@keyframes hitFlashGreen {
  0%,100%{ filter:drop-shadow(0 0 10px #4ade80); opacity:1; }
  25%    { filter:drop-shadow(0 0 24px #fff) brightness(3); opacity:.4; }
  50%    { filter:drop-shadow(0 0 10px #4ade80); opacity:1; }
  75%    { filter:drop-shadow(0 0 24px #fff) brightness(3); opacity:.4; }
}
/* Shake on hit */
@keyframes shakeHit {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}
  60%{transform:translateX(-8px)}
  80%{transform:translateX(8px)}
}
.fighter-opp.hit    .sprite-wrap img { animation:hitFlash .5s; }
.fighter-opp.hit    { animation:shakeHit .4s; }
.fighter-player.hit .sprite-wrap img { animation:hitFlashGreen .5s; }
.fighter-player.hit { animation:shakeHit .4s; }

/* Death (faint) */
@keyframes faint {
  0%  {opacity:1; transform:translateY(0) rotate(0); }
  100%{opacity:0; transform:translateY(30px) rotate(90deg);}
}
.fighter.fainted .sprite-wrap { animation: faint .8s forwards; }

/* ── DAMAGE NUMBERS ── */
.dmg-pop {
  position:absolute; font-size:.9rem; font-weight:bold;
  pointer-events:none; z-index:999;
  animation: dmgFloat .9s ease-out forwards;
}
@keyframes dmgFloat {
  0%   {opacity:1; transform:translateY(0) scale(1);}
  60%  {opacity:1; transform:translateY(-40px) scale(1.2);}
  100% {opacity:0; transform:translateY(-70px) scale(.8);}
}

/* ── HIT PARTICLES ── */
.particle {
  position:absolute; border-radius:50%;
  pointer-events:none; z-index:998;
  animation: burst .6s ease-out forwards;
}
@keyframes burst {
  0%  {opacity:1; transform:translate(0,0) scale(1);}
  100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.2);}
}

/* ── SCREEN FLASH ── */
#screen-flash {
  position:fixed; inset:0; z-index:900; pointer-events:none;
  opacity:0; transition:opacity .05s;
}

/* ── GAME LAYOUT ── */
.game-main { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }

/* ── PUZZLE GRID ── */
#game-grid {
  display:grid; grid-template-columns:repeat(6,1fr);
  gap:3px; background:#100d22; padding:6px;
  border:5px solid #6b4fa0;
  width:384px; height:432px;
  box-shadow:0 0 30px #ff2a6d55;
}

.block {
  background:#16213e; border:2px solid #1e2d4f;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; overflow:hidden; transition:border-color .1s;
}
.block img { width:80%; height:80%; object-fit:contain; transition:transform .12s; }
.block:hover img { transform:scale(1.25); }
.block.selected { border-color:#ffd700; box-shadow:inset 0 0 8px #ffd70099; }
.block.clearing { animation:clearPop .45s forwards; }
@keyframes clearPop {
  0%  {transform:scale(1);opacity:1;}
  50% {transform:scale(1.5);opacity:.7;}
  100%{transform:scale(0);opacity:0;}
}
.block.swapping { animation:swapBounce .15s ease-in-out; }
@keyframes swapBounce { 0%,100%{transform:scale(1)} 50%{transform:scale(.85)} }

/* ── COMBO TEXT ── */
#combo-text {
  text-align:center; margin-top:8px;
  height:32px; font-size:.9rem; color:#ffd700;
  text-shadow:0 0 10px #ffd700;
  animation:none;
}
.combo-anim { animation:comboPop .4s ease-out; }
@keyframes comboPop {
  0%  {transform:scale(.5); opacity:0;}
  60% {transform:scale(1.3);}
  100%{transform:scale(1); opacity:1;}
}

/* ── SIDE PANEL ── */
.side-panel { width:240px; display:flex; flex-direction:column; gap:10px; }

.score-box { text-align:center; }
.score-label { color:#ffd700; font-size:.6rem; letter-spacing:2px; }
#score { font-size:1.6rem; color:#ffd700; text-shadow:0 0 10px #ffd700; }

.tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.tool-btn {
  padding:10px 8px; background:#1e1240;
  border:2px solid #ff2a6d; color:#fff;
  font-size:.6rem; cursor:pointer; transition:all .15s;
  font-family:'Press Start 2P',monospace;
}
.tool-btn:hover { background:#ff2a6d22; box-shadow:0 0 12px #ff2a6d; }
.tool-btn:disabled { opacity:.4; cursor:not-allowed; }

.pause-btn {
  width:100%; padding:12px;
  background:#1e1a40; border:2px solid #ffd700;
  color:#fff; cursor:pointer; font-size:.7rem;
  font-family:'Press Start 2P',monospace;
  transition:all .15s;
}
.pause-btn:hover { background:#ffd70022; }

/* ── BATTLE LOG ── */
#battle-log {
  width:90%; max-width:800px;
  height:90px; overflow-y:auto;
  background:rgba(0,0,0,.7); padding:10px;
  font-size:.6rem; border:2px solid #3a2a6b;
  line-height:1.6;
}
#battle-log div { margin-bottom:2px; }

/* ── RESULT ── */
#result-overlay {
  position:fixed; inset:0;
  background:rgba(15,5,31,.97);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; z-index:1000; gap:18px;
}
.res-title { font-size:2.4rem; color:#ffd700; text-shadow:0 0 30px #ffd700; animation:vsPulse 1s infinite; }
.res-score { font-size:1rem; color:#fff; text-align:center; line-height:2; }
.res-btn {
  padding:14px 32px; margin:6px; cursor:pointer;
  font-family:'Press Start 2P',monospace; font-size:.75rem;
}
.res-btn-primary { background:#ff2a6d; color:#fff; border:none; box-shadow:0 0 20px #ff2a6d; }
.res-btn-secondary { background:transparent; border:2px solid #888; color:#ccc; }

/* ── TURN INDICATOR ── */
#turn-badge {
  font-size:.55rem; padding:4px 10px;
  background:#ffd70022; border:1px solid #ffd700;
  color:#ffd700; border-radius:2px;
  letter-spacing:1px;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  gap: 24px;
}
.login-box {
  background: linear-gradient(180deg, #1e1040 0%, #0d0820 100%);
  border: 2px solid #ffd700;
  box-shadow: 0 0 60px #ffd70022, 0 0 20px #ff2a6d22, inset 0 0 40px #fcd34d08;
  padding: 36px 44px 40px;
  display: flex; flex-direction: column; align-items: center;
  gap: 18px;
  max-width: 400px; width: 90%;
  position: relative; z-index: 2;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, #ffd700, #ff2a6d, #ffd700, transparent);
  animation: shimmer 2.5s linear infinite;
  background-size: 200%;
}
.login-title {
  font-size: 1rem; color: #ffd700;
  text-shadow: 0 0 16px #ffd700;
  letter-spacing: 3px;
}
.login-subtitle { font-size: .55rem; color: #888; letter-spacing: 2px; }
.trainer-icon {
  position: relative;
  width: 110px; height: 110px;
  display: flex; align-items: center; justify-content: center;
}
.trainer-icon img {
  width: 100px; height: 100px; object-fit: contain;
  image-rendering: pixelated;
  filter: drop-shadow(0 0 14px #fcd34d) drop-shadow(0 0 28px #fcd34d88);
  animation: loginPikaBob 2.2s ease-in-out infinite;
}
.trainer-icon::before {
  content: '';
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 80px; height: 12px;
  background: radial-gradient(ellipse, #fcd34d44 0%, transparent 70%);
  border-radius: 50%;
  animation: loginShadow 2.2s ease-in-out infinite;
}
.trainer-icon::after {
  content: '⚡';
  position: absolute; top: -6px; right: -8px;
  font-size: 1.2rem;
  animation: sparkle 1.5s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 6px #fcd34d);
}
@keyframes loginPikaBob {
  0%,100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-10px) scale(1.04); }
}
@keyframes loginShadow {
  0%,100% { opacity: .7; transform: translateX(-50%) scaleX(1); }
  50%      { opacity: .3; transform: translateX(-50%) scaleX(.7); }
}
@keyframes sparkle {
  from { transform: rotate(-15deg) scale(1); opacity: .8; }
  to   { transform: rotate(15deg) scale(1.3); opacity: 1; }
}
.username-input {
  width: 100%;
  background: #0a0618;
  border: 2px solid #6b4fa0;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: .7rem;
  padding: 14px 16px;
  outline: none;
  text-align: center;
  letter-spacing: 2px;
  transition: border-color .2s, box-shadow .2s;
}
.username-input:focus {
  border-color: #ffd700;
  box-shadow: 0 0 16px #ffd70044;
}
.username-input::placeholder { color: #555; }
.login-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #ff2a6d, #c0006a);
  color: #fff; border: none; cursor: pointer;
  font-family: 'Press Start 2P', monospace;
  font-size: .75rem;
  box-shadow: 0 0 20px #ff2a6d66;
  transition: all .2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.login-btn:hover { transform: scale(1.04); box-shadow: 0 0 36px #ff2a6d; }
.login-error { font-size: .55rem; color: #f87171; min-height: 16px; }
.login-divider { width: 100%; border: none; border-top: 1px solid #2a1b4d; margin: 4px 0; }
.view-lb-btn {
  background: transparent; border: 2px solid #6b4fa0;
  color: #c084fc; font-family: 'Press Start 2P', monospace;
  font-size: .55rem; padding: 10px 20px; cursor: pointer;
  transition: all .2s;
}
.view-lb-btn:hover { border-color: #c084fc; box-shadow: 0 0 12px #c084fc55; }

/* ── LEADERBOARD OVERLAY ── */
#leaderboard-overlay {
  position: fixed; inset: 0;
  background: rgba(15,5,31,.98);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; z-index: 2000; gap: 16px;
  padding: 20px;
}
.lb-box {
  background: linear-gradient(180deg, #1a0f30, #0d0820);
  border: 3px solid #ffd700;
  box-shadow: 0 0 40px #ffd70033;
  padding: 28px 32px;
  width: min(520px, 95vw);
  max-height: 80vh;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
}
.lb-title {
  font-size: 1rem; color: #ffd700;
  text-shadow: 0 0 16px #ffd700;
  text-align: center; letter-spacing: 3px;
}
.lb-subtitle { font-size: .5rem; color: #888; text-align: center; letter-spacing: 2px; }
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th {
  font-size: .5rem; color: #ffd700; padding: 8px 6px;
  border-bottom: 2px solid #2a1b4d; text-align: left;
  letter-spacing: 1px;
}
.lb-table td {
  font-size: .55rem; color: #ddd; padding: 10px 6px;
  border-bottom: 1px solid #1a1040;
}
.lb-table tr.lb-me td { color: #4ade80; }
.lb-table tr.lb-me { background: #4ade8011; }
.lb-rank { color: #888; width: 32px; }
.lb-rank.gold   { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }
.lb-score { color: #ff2a6d; text-align: right; }
.lb-empty { text-align: center; color: #555; font-size: .55rem; padding: 24px; }
.lb-close-btn {
  padding: 12px 28px;
  background: transparent; border: 2px solid #888;
  color: #ccc; font-family: 'Press Start 2P', monospace;
  font-size: .6rem; cursor: pointer; transition: all .2s;
}
.lb-close-btn:hover { border-color: #ffd700; color: #ffd700; }
.lb-loading { text-align: center; color: #555; font-size: .5rem; padding: 20px; }

/* ── PLAYER BADGE on game screen ── */
.player-badge {
  font-size: .5rem; color: #4ade80;
  background: #4ade8011; border: 1px solid #4ade8033;
  padding: 3px 8px; border-radius: 2px;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="arena-bg"></div>
<div id="screen-flash"></div>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen" class="screen active">
  <div class="hero-content" style="text-align:center;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div class="title" style="font-size:2rem;">POKÉMON</div>
    <div class="title" style="font-size:2.4rem;margin-top:-10px;">PUZZLE BATTLE</div>

    <div class="login-box">
      <div class="trainer-icon">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="Pikachu">
      </div>
      <div class="login-title">TRAINER LOGIN</div>
      <div class="login-subtitle">ENTER YOUR TRAINER NAME</div>
      <input
        type="text"
        id="username-input"
        class="username-input"
        placeholder="YOUR NAME HERE"
        maxlength="12"
        autocomplete="off"
        onkeydown="if(event.key==='Enter')doLogin()"
      >
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" onclick="doLogin()">▶ ENTER BATTLE</button>
      <hr class="login-divider">
      <button class="view-lb-btn" onclick="showLeaderboard('login')">🏆 VIEW LEADERBOARD</button>
    </div>
  </div>
  <div class="hero-pokemon">
    <img class="poke-1" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" alt="Squirtle">
    <img class="poke-2" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" alt="Charmander">
    <img class="poke-3" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="Pikachu">
    <img class="poke-4" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Charizard">
    <img class="poke-5" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbasaur">
    <img class="poke-6" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/94.png" alt="Gengar">
  </div>
</div>

<!-- ══ TITLE SCREEN ══ -->
<div id="hero-screen" class="screen">
  <div class="hero-content" style="text-align:center">
    <div class="title">POKÉMON</div>
    <div class="title" style="font-size:3rem;margin-top:-10px;">PUZZLE BATTLE</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
const ROWS = 10, COLS = 6;

const POKE_TYPES = [
  { color:'#fcd34d', pokes:[25,26,135,100] },   // electric (yellow)
  { color:'#f87171', pokes:[4,5,6,37,38,58] },   // fire (red)
  { color:'#60a5fa', pokes:[7,8,9,54,55,129] },  // water (blue)
  { color:'#4ade80', pokes:[1,2,3,43,44,45] },   // grass (green)
  { color:'#c084fc', pokes:[92,93,94,200] },      // ghost (purple)
];

function randPoke() {
  const t = POKE_TYPES[Math.floor(Math.random()*POKE_TYPES.length)];
  const id = t.pokes[Math.floor(Math.random()*t.pokes.length)];
  return { src:`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`, typeIdx:POKE_TYPES.indexOf(t) };
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let grid = [], score = 0, combo = 0, selected = null;
let isLocked = false, gameRunning = false, paused = false;
let playerHP = 100, oppHP = 100;
let bombCount = 3, megaCount = 2;
let oppTimer = null, hintEl = null;
let currentUsername = '';
let lbReturnScreen = 'hero'; // where to return after closing leaderboard

const $ = id => document.getElementById(id);

// ══════════════════════════════════════════════════════
//  LOGIN SYSTEM
// ══════════════════════════════════════════════════════
function doLogin() {
  const input = $('username-input');
  const name = input.value.trim().toUpperCase();
  const err = $('login-error');

  if (name.length < 2) {
    err.textContent = 'NAME TOO SHORT! (2-12 CHARS)';
    input.focus();
    return;
  }
  if (!/^[A-Z0-9 _\-!]+$/i.test(name)) {
    err.textContent = 'LETTERS & NUMBERS ONLY!';
    input.focus();
    return;
  }

  err.textContent = '';
  currentUsername = name;

  // Update displays
  $('hero-trainer-name').textContent = '✦ TRAINER: ' + name + ' ✦';
  $('game-trainer-name').textContent = name;

  $('login-screen').classList.remove('active');
  $('hero-screen').classList.add('active');
}

function goToLogin() {
  gameRunning = false;
  clearInterval(oppTimer);
  $('result-overlay').style.display = 'none';
  $('game-screen').classList.remove('active');
  $('hero-screen').classList.remove('active');
  $('login-screen').classList.add('active');
  $('username-input').value = '';
  $('login-error').textContent = '';
  currentUsername = '';
  setTimeout(() => $('username-input').focus(), 100);
}

// ══════════════════════════════════════════════════════
//  LEADERBOARD SYSTEM
// ══════════════════════════════════════════════════════
const LB_KEY = 'pokemon-puzzle-battle-leaderboard';
const LB_MAX = 20;

async function saveScore(username, score, won) {
  if (!username || score <= 0) return;
  try {
    let lb = await loadLBData();
    // Find if user already has an entry
    const existing = lb.find(e => e.name === username);
    if (existing) {
      if (score > existing.score) {
        existing.score = score;
        existing.wins = (existing.wins || 0) + (won ? 1 : 0);
        existing.games = (existing.games || 0) + 1;
        existing.date = new Date().toLocaleDateString();
      } else {
        existing.wins = (existing.wins || 0) + (won ? 1 : 0);
        existing.games = (existing.games || 0) + 1;
      }
    } else {
      lb.push({
        name: username,
        score: score,
        wins: won ? 1 : 0,
        games: 1,
        date: new Date().toLocaleDateString()
      });
    }
    // Sort by score descending
    lb.sort((a, b) => b.score - a.score);
    lb = lb.slice(0, LB_MAX);
    await window.storage.set(LB_KEY, JSON.stringify(lb), true);
  } catch(e) {
    console.error('LB save error:', e);
  }
}

async function loadLBData() {
  try {
    const result = await window.storage.get(LB_KEY, true);
    if (result && result.value) return JSON.parse(result.value);
  } catch(e) {}
  return [];
}

async function showLeaderboard(returnTo) {
  lbReturnScreen = returnTo;
  const overlay = $('leaderboard-overlay');
  overlay.style.display = 'flex';
  $('lb-content').innerHTML = '<div class="lb-loading">⚡ Loading...</div>';

  // Pause game if open
  if (returnTo === 'game' && gameRunning && !paused) {
    paused = true;
    $('pause-btn').textContent = '▶ RESUME';
  }

  try {
    const lb = await loadLBData();
    renderLB(lb);
  } catch(e) {
    $('lb-content').innerHTML = '<div class="lb-empty">Could not load leaderboard.</div>';
  }
}

function renderLB(lb) {
  if (!lb || lb.length === 0) {
    $('lb-content').innerHTML = '<div class="lb-empty">NO RECORDS YET!<br><br>BE THE FIRST CHAMPION!</div>';
    return;
  }

  const rankLabels = ['gold', 'silver', 'bronze'];
  const rankEmoji = ['🥇', '🥈', '🥉'];

  let html = '<table class="lb-table"><thead><tr><th>RANK</th><th>TRAINER</th><th>W/G</th><th style="text-align:right">BEST SCORE</th></tr></thead><tbody>';

  lb.forEach((entry, i) => {
    const isMe = entry.name === currentUsername;
    const rankClass = i < 3 ? rankLabels[i] : '';
    const rankDisp = i < 3 ? rankEmoji[i] : `#${i+1}`;
    const winRate = entry.games ? `${entry.wins}/${entry.games}` : '0/0';
    html += `<tr class="${isMe ? 'lb-me' : ''}">
      <td class="lb-rank ${rankClass}">${rankDisp}</td>
      <td>${entry.name}${isMe ? ' ◀' : ''}</td>
      <td style="color:#888;font-size:.5rem">${winRate}</td>
      <td class="lb-score">${String(entry.score).padStart(6,'0')}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  $('lb-content').innerHTML = html;
}

function closeLeaderboard() {
  $('leaderboard-overlay').style.display = 'none';
  // If we were in-game, keep paused state as is (user can resume)
}

// ══════════════════════════════════════════════════════
//  STARFIELD
// ══════════════════════════════════════════════════════
function buildStars() {
  const bg = $('arena-bg');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2+1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*2}s;`;
    bg.appendChild(s);
  }
}

// ══════════════════════════════════════════════════════
//  GRID CREATION
// ══════════════════════════════════════════════════════
function createGrid() {
  const gridEl = $('game-grid');
  gridEl.innerHTML = '';
  grid = [];
  gridEl.style.gridTemplateRows = `repeat(${ROWS},1fr)`;

  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const data = randPoke();
      const el = makeBlock(data, r, c);
      grid[r][c] = { ...data, el };
      gridEl.appendChild(el);
    }
  }
}

function makeBlock(data, r, c) {
  const el = document.createElement('div');
  el.className = 'block';
  el.dataset.row = r; el.dataset.col = c;
  const img = document.createElement('img');
  img.src = data.src;
  el.appendChild(img);
  el.onclick = () => handleClick(r, c);
  return el;
}

// ══════════════════════════════════════════════════════
//  CLICK / SWAP
// ══════════════════════════════════════════════════════
function handleClick(row, col) {
  if (!gameRunning || paused || isLocked) return;
  clearHint();

  if (!selected) {
    selected = { row, col };
    grid[row][col].el.classList.add('selected');
    return;
  }

  grid[selected.row][selected.col].el.classList.remove('selected');
  const dr = Math.abs(selected.row - row);
  const dc = Math.abs(selected.col - col);

  if (dr + dc === 1) {
    doSwap(selected.row, selected.col, row, col);
  }
  selected = null;
}

async function doSwap(r1, c1, r2, c2) {
  isLocked = true;
  swapData(r1,c1,r2,c2);
  renderGrid();

  grid[r1][c1].el.classList.add('swapping');
  grid[r2][c2].el.classList.add('swapping');
  await delay(160);
  grid[r1][c1].el.classList.remove('swapping');
  grid[r2][c2].el.classList.remove('swapping');

  const matches = findMatches();
  if (matches.length > 0) {
    combo = 0;
    await processMatches(matches, true);
  } else {
    // swap back
    swapData(r1,c1,r2,c2);
    renderGrid();
  }
  isLocked = false;
}

function swapData(r1,c1,r2,c2) {
  const tmp = { src:grid[r1][c1].src, typeIdx:grid[r1][c1].typeIdx };
  grid[r1][c1].src = grid[r2][c2].src; grid[r1][c1].typeIdx = grid[r2][c2].typeIdx;
  grid[r2][c2].src = tmp.src; grid[r2][c2].typeIdx = tmp.typeIdx;
}

function renderGrid() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      grid[r][c].el.querySelector('img').src = grid[r][c].src;
}

// ══════════════════════════════════════════════════════
//  MATCH FINDING
// ══════════════════════════════════════════════════════
function findMatches() {
  const matched = new Set();

  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS-2; c++) {
      const t = grid[r][c].typeIdx;
      if (t === grid[r][c+1].typeIdx && t === grid[r][c+2].typeIdx) {
        let end = c+2;
        while (end+1 < COLS && grid[r][end+1].typeIdx === t) end++;
        for (let k = c; k <= end; k++) matched.add(`${r},${k}`);
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS-2; r++) {
      const t = grid[r][c].typeIdx;
      if (t === grid[r+1][c].typeIdx && t === grid[r+2][c].typeIdx) {
        let end = r+2;
        while (end+1 < ROWS && grid[end+1][c].typeIdx === t) end++;
        for (let k = r; k <= end; k++) matched.add(`${k},${c}`);
      }
    }
  }
  return [...matched].map(s => { const [r,c]=s.split(','); return {r:+r,c:+c}; });
}

// ══════════════════════════════════════════════════════
//  PROCESS MATCHES → ATTACK ANIMATION
// ══════════════════════════════════════════════════════
async function processMatches(matches, playerTurn) {
  combo++;

  // Animate clearing
  for (const {r,c} of matches) {
    grid[r][c].el.classList.add('clearing');
  }
  await delay(450);

  const dmg = Math.floor((8 + matches.length * 3) * (1 + combo * .2));
  score += dmg * 10;
  $('score').textContent = String(score).padStart(6,'0');

  // Collapse
  collapse();
  refill();
  renderGrid();

  // Show combo text
  const ct = $('combo-text');
  ct.textContent = combo > 1 ? `${combo} COMBO!` : 'MATCH!';
  ct.className = 'combo-anim';
  setTimeout(() => { ct.className=''; }, 500);

  if (playerTurn) {
    await playerAttackAnim(dmg);
    // Chain check
    const next = findMatches();
    if (next.length) {
      await delay(200);
      await processMatches(next, true);
    } else {
      combo = 0;
    }
  } else {
    await oppAttackAnim(dmg);
  }
}

function collapse() {
  for (let c = 0; c < COLS; c++) {
    let write = ROWS - 1;
    for (let r = ROWS-1; r >= 0; r--) {
      if (!grid[r][c].el.classList.contains('clearing')) {
        if (write !== r) {
          grid[write][c].src = grid[r][c].src;
          grid[write][c].typeIdx = grid[r][c].typeIdx;
        }
        write--;
      }
    }
    for (let r = write; r >= 0; r--) {
      const nd = randPoke();
      grid[r][c].src = nd.src;
      grid[r][c].typeIdx = nd.typeIdx;
    }
  }
  // Remove clearing class
  for (let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r][c].el.classList.remove('clearing');
}

function refill() { /* already done in collapse */ }

// ══════════════════════════════════════════════════════
//  ATTACK ANIMATIONS
// ══════════════════════════════════════════════════════
async function playerAttackAnim(dmg) {
  const fp = $('fighter-player');
  const fo = $('fighter-opp');

  // Player slides toward opponent
  fp.classList.add('attacking');
  await delay(300);

  // Flash screen
  flashScreen('#ff000033');

  // Hit particles on opponent
  spawnParticles(fo, '#f87171');

  // Damage number
  spawnDmgNumber(fo, `-${dmg}`, '#ff4444');

  // Opponent hit
  fo.classList.add('hit');
  await delay(180);
  fp.classList.remove('attacking');

  // Update opp HP
  oppHP = Math.max(0, oppHP - dmg);
  $('opp-health').style.width = oppHP + '%';
  updateHPColor('opp-health', oppHP);

  await delay(350);
  fo.classList.remove('hit');

  addLog(`⚡ Pikachu deals ${dmg} damage!`, '#4ade80');

  if (oppHP <= 0) { fo.classList.add('fainted'); await delay(900); endGame(true); }
}

async function oppAttackAnim(dmg) {
  const fp = $('fighter-player');
  const fo = $('fighter-opp');

  fo.classList.add('attacking');
  await delay(300);

  flashScreen('#ff440022');
  spawnParticles(fp, '#4ade80');
  spawnDmgNumber(fp, `-${dmg}`, '#f87171');

  fp.classList.add('hit');
  await delay(180);
  fo.classList.remove('attacking');

  playerHP = Math.max(0, playerHP - dmg);
  $('player-health').style.width = playerHP + '%';
  updateHPColor('player-health', playerHP);

  await delay(350);
  fp.classList.remove('hit');

  addLog(`🔥 Charizard deals ${dmg} damage!`, '#f87171');

  if (playerHP <= 0) { fp.classList.add('fainted'); await delay(900); endGame(false); }
}

// ── Visual helpers ──
function flashScreen(color) {
  const f = $('screen-flash');
  f.style.background = color;
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity = '0', 80);
}

function spawnParticles(targetEl, color) {
  const rect = targetEl.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 4 + Math.random()*6;
    const angle = Math.random()*Math.PI*2;
    const dist = 30 + Math.random()*50;
    p.style.cssText = `
      width:${sz}px; height:${sz}px;
      background:${color};
      left:${cx}px; top:${cy}px;
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      box-shadow:0 0 6px ${color};
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 650);
  }
}

function spawnDmgNumber(targetEl, text, color) {
  const rect = targetEl.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'dmg-pop';
  d.textContent = text;
  d.style.cssText = `color:${color};left:${rect.left+rect.width/2-20}px;top:${rect.top+20}px;text-shadow:0 0 8px ${color};`;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 950);
}

function updateHPColor(id, hp) {
  const fill = $(id);
  if (hp > 50) fill.style.filter = '';
  else if (hp > 25) fill.style.filter = 'hue-rotate(-20deg)';
  else fill.style.filter = 'hue-rotate(-60deg) saturate(2)';
}

// ══════════════════════════════════════════════════════
//  OPPONENT AI TIMER
// ══════════════════════════════════════════════════════
function startOppTimer() {
  oppTimer = setInterval(async () => {
    if (!gameRunning || paused || isLocked) return;
    isLocked = true;
    $('turn-badge').textContent = "OPP TURN";
    await delay(400);
    const dmg = 8 + Math.floor(Math.random()*10);
    await oppAttackAnim(dmg);
    $('turn-badge').textContent = "YOUR TURN";
    isLocked = false;
  }, 9000);
}

// ══════════════════════════════════════════════════════
//  TOOLS
// ══════════════════════════════════════════════════════
function useHint() {
  if (!gameRunning||paused||isLocked) return;
  clearHint();
  // Find first swappable match
  outer: for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS-1;c++) {
      swapData(r,c,r,c+1);
      const m = findMatches();
      swapData(r,c,r,c+1);
      if (m.length) {
        grid[r][c].el.classList.add('selected');
        hintEl = grid[r][c].el;
        addLog('🔍 Hint shown!','#00ffcc');
        setTimeout(clearHint,2000);
        break outer;
      }
    }
  }
}
function clearHint() { if(hintEl){hintEl.classList.remove('selected');hintEl=null;} }

function useShuffle() {
  if (!gameRunning||paused||isLocked) return;
  for (let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) { const nd=randPoke(); grid[r][c].src=nd.src; grid[r][c].typeIdx=nd.typeIdx; }
  renderGrid();
  addLog('🔀 Board shuffled!','#a78bfa');
}

function useBomb() {
  if (!gameRunning||paused||isLocked||bombCount<=0) return;
  bombCount--;
  $('bomb-ct').textContent = bombCount;
  // Clear center 2x2
  const cr=Math.floor(ROWS/2), cc=Math.floor(COLS/2);
  const targets=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
    const nr=cr+dr,nc=cc+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) targets.push({r:nr,c:nc});
  }
  targets.forEach(({r,c}) => grid[r][c].el.classList.add('clearing'));
  flashScreen('#ff880055');
  addLog('💣 BOMB! Area cleared!','#ff8800');
  setTimeout(()=>{ collapse(); renderGrid(); }, 450);
}

function useMega() {
  if (!gameRunning||paused||isLocked||megaCount<=0) return;
  megaCount--;
  $('mega-ct').textContent = megaCount;
  const dmg = 30 + Math.floor(Math.random()*20);
  flashScreen('#ffff0044');
  spawnParticles($('fighter-opp'),'#ffd700');
  spawnDmgNumber($('fighter-opp'),`-${dmg}`,'#ffd700');
  $('fighter-player').classList.add('attacking');
  setTimeout(()=>$('fighter-player').classList.remove('attacking'),550);
  $('fighter-opp').classList.add('hit');
  setTimeout(()=>$('fighter-opp').classList.remove('hit'),550);
  oppHP = Math.max(0, oppHP - dmg);
  $('opp-health').style.width = oppHP+'%';
  updateHPColor('opp-health',oppHP);
  addLog(`⚡ MEGA ATTACK! ${dmg} damage!`,'#ffd700');
  score += dmg * 15;
  $('score').textContent = String(score).padStart(6,'0');
  if (oppHP <= 0) { $('fighter-opp').classList.add('fainted'); setTimeout(()=>endGame(true),900); }
}

// ══════════════════════════════════════════════════════
//  PAUSE
// ══════════════════════════════════════════════════════
function togglePause() {
  paused = !paused;
  $('pause-btn').textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
  addLog(paused ? '⏸ Paused':'▶ Resumed','#aaa');
}

// ══════════════════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════════════════
function addLog(text, color='#fff') {
  const log = $('battle-log');
  const d = document.createElement('div');
  d.style.color = color;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  // keep last 30 lines
  while (log.children.length > 30) log.removeChild(log.firstChild);
}

// ══════════════════════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════════════════════
function startGame() {
  $('hero-screen').classList.remove('active');
  $('game-screen').classList.add('active');

  score=0; combo=0; playerHP=100; oppHP=100;
  bombCount=3; megaCount=2;
  selected=null; isLocked=false; paused=false;

  $('score').textContent='000000';
  $('player-health').style.width='100%';
  $('opp-health').style.width='100%';
  $('battle-log').innerHTML='';
  $('combo-text').textContent='';
  $('bomb-ct').textContent='3';
  $('mega-ct').textContent='2';
  $('pause-btn').textContent='⏸ PAUSE';
  $('turn-badge').textContent='YOUR TURN';

  // Reset fighters
  ['fighter-player','fighter-opp'].forEach(id => {
    const el=$(id);
    el.classList.remove('attacking','hit','fainted');
  });

  if (oppTimer) clearInterval(oppTimer);
  createGrid();
  gameRunning = true;
  startOppTimer();
  addLog('🔥 BATTLE START! Match Pokémon to attack!','#ffd700');
}

async function endGame(won) {
  gameRunning = false;
  clearInterval(oppTimer);

  // Save score to leaderboard
  if (currentUsername) {
    await saveScore(currentUsername, score, won);
  }

  // Find rank
  let rankMsg = '';
  try {
    const lb = await loadLBData();
    const rank = lb.findIndex(e => e.name === currentUsername) + 1;
    if (rank === 1) rankMsg = '<br><span style="color:#ffd700;font-size:.7rem">🥇 #1 ALL TIME!</span>';
    else if (rank === 2) rankMsg = '<br><span style="color:#c0c0c0;font-size:.65rem">🥈 #2 ALL TIME!</span>';
    else if (rank === 3) rankMsg = '<br><span style="color:#cd7f32;font-size:.65rem">🥉 #3 ALL TIME!</span>';
    else if (rank > 0) rankMsg = `<br><span style="color:#888;font-size:.6rem">RANK #${rank}</span>`;
  } catch(e) {}

  const ov = $('result-overlay');
  $('res-title').textContent = won ? '🏆 YOU WIN!' : '💀 GAME OVER';
  $('res-score').innerHTML = `TRAINER: ${currentUsername || 'UNKNOWN'}<br>FINAL SCORE<br>${String(score).padStart(6,'0')}${rankMsg}`;
  ov.style.display = 'flex';
}

function restartGame() {
  $('result-overlay').style.display='none';
  startGame();
}

function goToTitle() {
  gameRunning=false; clearInterval(oppTimer);
  $('result-overlay').style.display='none';
  $('game-screen').classList.remove('active');
  $('hero-screen').classList.add('active');
}

// ══════════════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k==='q') useHint();
  if (k==='w') useShuffle();
  if (k==='r') useBomb();
  if (k==='e') useMega();
  if (k==='p' || k==='escape') togglePause();
});

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
window.onload = () => {
  buildStars();
  setTimeout(() => $('username-input').focus(), 200);
};
